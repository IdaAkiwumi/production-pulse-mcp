name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install
      run: |
        pip install -r requirements.txt
        pip install ruff
    - name: Lint
      run: ruff check src/
    - name: Test imports
      run: python -c "from production_pulse.server import mcp; print('MCP Server loads correctly')"